<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Corvox Chat (RAG Demo)</title>
  <style>
    :root { --bg:#0b1220; --panel:#11192a; --text:#e8eefc; --muted:#9fb2d0; --accent:#6ea8fe; }
    * { box-sizing:border-box; }
    body { margin:0; font:16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:840px; margin:0 auto; padding:24px; }
    h1 { font-size:20px; margin:0 0 16px; color:#fff; }
    .panel { background:var(--panel); border:1px solid #1a2540; border-radius:16px; overflow:hidden; }
    .msgs { height:60vh; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:75%; padding:12px 14px; border-radius:12px; white-space:pre-wrap; }
    .me { align-self:flex-end; background:#233355; color:#dce7ff; border-top-right-radius:4px; }
    .bot { align-self:flex-start; background:#0f1830; border:1px solid #1a2540; border-top-left-radius:4px; }
    .input { display:flex; gap:10px; padding:12px; border-top:1px solid #1a2540; background:#0f1730; }
    input[type=text] { flex:1; padding:12px 14px; border-radius:10px; border:1px solid #233355; background:#0c1427; color:var(--text); outline:none; }
    button { padding:12px 16px; border-radius:10px; border:1px solid #2b3f70; background:var(--accent); color:#06122a; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .hint { margin-top:10px; color:var(--muted); font-size:13px; }
    .small { font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Corvox Chat (RAG demo)</h1>
    <div class="panel">
      <div id="msgs" class="msgs"></div>
      <form id="form" class="input">
        <input id="q" type="text" placeholder="Ask something… e.g., What services does Corvox offer?" autocomplete="off" />
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </div>
    <div class="hint small">
      Answers are powered by your Corvox knowledge base (Qdrant + FastAPI on Render).
    </div>
  </div>

  <script>
    // 🔧 CHANGE THIS to your Render backend base URL
    const API_URL = "https://corvox-rag-api.onrender.com";

    const msgs = document.getElementById('msgs');
    const form = document.getElementById('form');
    const q = document.getElementById('q');
    const sendBtn = document.getElementById('sendBtn');

    const add = (text, who) => {
      const div = document.createElement('div');
      div.className = `msg ${who}`;
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = q.value.trim();
      if (!message) return;

      add(message, 'me');
      q.value = '';
      q.focus();
      sendBtn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        if (!res.ok) {
          const txt = await res.text();
          add(`Error ${res.status}: ${txt}`, 'bot');
        } else {
          const data = await res.json();
          add(data.answer || 'No answer.', 'bot');
        }
      } catch (err) {
        add('Network error — check the API URL or CORS.', 'bot');
      } finally {
        sendBtn.disabled = false;
      }
    });

    // Optional: seed a sample question
    add("Hi! Ask me about Corvox services, support times, or contact.", "bot");
  </script>
</body>
</html>
